services:

  postgres:
    image: postgres:16
    container_name: pep-postgres

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: pep

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq

    ports:
      - "5672:5672"
      - "15672:15672"

  api:
    build:
      context: ./clinical-microservice
      dockerfile: Dockerfile

    container_name: clinical-api

    depends_on:
      - rabbitmq
      - postgres

    env_file:
      - .env

    ports:
      - "8000:8000"

volumes:
  postgres_data: